<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peril</title>
    <style>
      html,body,#app{margin:0;height:100%;background:#e8e8e6;color:#2a2a28}
      #boot{position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;transition:opacity .4s ease;background:radial-gradient(1000px 500px at 50% -10%,#fff 0%,transparent 55%),linear-gradient(180deg,#ececea,#e2e2de);font-family:Georgia,serif}
      #boot.gone{opacity:0}
      #boot b{font-weight:400;font-size:clamp(2.4rem,8vw,4.5rem);letter-spacing:-.02em}
    </style>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  </head>
  <body>
    <div id="boot"><b>Peril</b></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
